version: 2
updates:
  # Web app npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    ignore:
      # Major Astro upgrades often have breaking changes — handle manually
      - dependency-name: astro
        update-types: [version-update:semver-major]

  # Mobile app npm packages
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    ignore:
      # Expo SDK pins these — upgrading them outside `npx expo install --fix`
      # breaks EAS builds (e.g. react-native 0.86 on SDK 54, PR #22). Upgrade
      # by bumping the Expo SDK, not via dependabot.
      - dependency-name: "expo*"
      - dependency-name: "@expo/*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native*"
      - dependency-name: "@react-native*"
      - dependency-name: "@types/react"
      - dependency-name: "@sentry/react-native"

  # Python scripts (requirements.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions — keep action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

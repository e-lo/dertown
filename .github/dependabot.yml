version: 2
updates:
  # Web app npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    ignore:
      # Major Astro upgrades often have breaking changes — handle manually
      - dependency-name: astro
        update-types: [version-update:semver-major]

  # Mobile app npm packages
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    groups:
      expo-ecosystem:
        patterns:
          - expo*
          - react-native*
          - "@expo/*"
      patch-and-minor:
        update-types:
          - minor
          - patch

  # Python scripts (requirements.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions — keep action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

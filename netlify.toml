[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 6 requires Node 20.19+ / 22.12+
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[images]
remote_images = ["https://.*"]

# The Netlify adapter handles routing automatically
# No need for manual redirects when using SSR
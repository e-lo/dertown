# Der Town Event Scraper — Source Configuration
# Each source maps to a row in the source_sites DB table.
# Extraction rules, selectors, and filters are kept here (version-controlled).
# Runtime state (last_scraped, last_status) lives in the DB.

# ── Tag inference ────────────────────────────────────────────────────
# Global max characters for event descriptions across all extractors.
# Keep this large to preserve full detail while preventing runaway payloads.
description_max_chars: 12000

# ── Tag inference ────────────────────────────────────────────────────
# Keywords matched against event title + description (word-boundary match).
# Order matters: first match wins, so put specific tags before broad ones.
tag_keywords:
  family:
    - kids
    - family
    - children
    - youth
    - camp
    - storytime
    - story time
  nature:
    - bird
    - wildlife
    - nature
    - garden
    - plant
    - ecology
    - river
    - tracking
  arts-culture:
    - concert
    - music
    - musical
    - dance
    - performance
    - theater
    - theatre
    - art
    - gallery
    - film
    - movie
    - singer
    - songwriter
    - band
    - opera
  civic:
    - meeting
    - council
    - board
    - commission
    - civic
    - town hall
    - vote
  recreation:
    - hike
    - trail
    - ski
    - snowshoe
    - climb
    - kayak
    - bike
    - mountain
  sports:
    - race
    - tournament
    - league
    - game day
    - championship

# Venue name patterns → default tag (when no keyword matches).
venue_tags:
  - match: 'snowy owl'
    tag: 'arts-culture'

# ── Sources ──────────────────────────────────────────────────────────
# Optional per-source series linking:
#   series_parent_rules:
#     - title_keywords: ['keyword a', 'keyword b']
#       parent_title: 'Existing Approved Or Pending Series Parent Title'
# Keywords are matched against scraped event titles (case-insensitive).
sources:
  - id: 'icicle-creek'
    name: 'Icicle Creek Center'
    url: 'https://icicle.org/find-events/'
    type: 'html'
    selectors: {} # to be determined during implementation
    detail_description_selectors:
      - '.tribe-events-single-event-description'
      - '.entry-content'
      - '.event-content'
      - 'main article'
    geo_filter: null
    default_organization: 'Icicle Creek Center for the Arts'
    default_location: 'Icicle Creek Center for the Arts'
    default_tag: 'arts-culture'
    exclude:
      title_keywords:
        - ' camp' # "Summer Strings Camp", "Art & Mindful Movement Camp"
        - 'group lessons' # "Beginning Guitar - Group Lessons"
        - 'intro to mixing'
      title_patterns:
        - '^intro to ' # "Intro to ..." multi-session classes
    series_parent_rules:
      - title_keywords: ['story time']
        parent_title: 'Storybook Theater'

  - id: 'ncw-leavenworth-libraries'
    name: 'Leavenworth Library'
    url: 'https://ncwlibraries.libcal.com/calendar/leavenworth'
    type: 'json-api'
    api_url: 'https://ncwlibraries.libcal.com/ajax/calendar/list'
    api_cal_ids: '20171' # Leavenworth (20171) 
    geo_filter: null # Not needed — calendar IDs already filter to local branches
    default_organization: 'Leavenworth Public Library'
    default_location: 'Leavenworth Public Library'
    default_tag: null
    exclude: null
    organization_map:
      'Leavenworth Library': 'Leavenworth Public Library'
    series_parent_rules:
      - title_keywords: ['story time']
        parent_title: 'Story Time at the Library Series'
      - title_keywords: ['Culture Critics Club']
        parent_title: 'Culture Critics Club Series'
      - title_keywords: ['Teen Library Council']
        parent_title: 'Teen Library Council Series'
      - title_keywords: ['ATLAS (At the Library After School) Club']
        parent_title: 'ATLAS (At the Library After School) Club Leavenworth'
      - title_keywords: ['Banned Book Club']
        parent_title: 'Banned Book Club (Series)'
      - title_keywords: ['Coordinated Entry Services']
        parent_title: 'Coordinated Entry Services for Homeless/Housing Insecure series'

  - id: 'ncw-peshastin-libraries'
    name: 'Peshastin Library'
    url: 'https://ncwlibraries.libcal.com/calendar/peshastin'
    type: 'json-api'
    api_url: 'https://ncwlibraries.libcal.com/ajax/calendar/list'
    api_cal_ids: '20179' #  Peshastin (20179)
    geo_filter: null # Not needed — calendar IDs already filter to local branches
    default_organization: 'Peshastin Public Library'
    default_location: 'Peshastin Public Library'
    default_tag: null
    exclude: null
    organization_map:
      'Peshastin Library': 'Peshastin Public Library'
    series_parent_rules:
      - title_keywords: ['Clases de inglés']
        parent_title: 'Clases de inglés / English Language Learning Classes'
      - title_keywords: ['Teen Library Council']
        parent_title: 'Teen Library Council Series'
      - title_keywords: ['ATLAS (At the Library After School) Club']
        parent_title: 'ATLAS (At the Library After School) Club Peshastin'
      - title_keywords: ['Ukulele Circle']
        parent_title: 'Peshastin Library Ukulele Circle (PLUC)'
      - title_keywords: ['Book Club']
        parent_title: 'Peshastin Friends of the Library Book Club'

  - id: 'ski-leavenworth'
    name: 'Ski Leavenworth'
    url: 'https://skileavenworth.com/events'
    type: 'html'
    selectors: {}
    detail_description_selectors:
      - '.node-event .field--name-body'
      - '.field--name-body'
      - 'article .node__content'
      - 'main article'
    geo_filter: null
    default_organization: 'Leavenworth Winter Sports Club'
    default_location: 'Leavenworth Ski Hill'
    default_tag: 'recreation'
    exclude: null
    location_map:
      'Bavarian Lodge': 'Ski Hill Lodge'
    series_parent_rules:
      - title_keywords: ['summer music']
        parent_title: 'Ski Hill Summer Music Series'
      - title_keywords: ['Board Meeting']
        parent_title: 'Storybook Theater'

  - id: 'icicle-brewing'
    name: 'Icicle Brewing Company'
    url: 'https://iciclebrewing.com/ibc-events/'
    type: 'html'
    selectors: {}
    geo_filter: null
    default_organization: 'Icicle Brewing Company'
    default_location: 'Icicle Brewing Taproom'
    default_tag: null
    exclude:
      title_keywords:
        - 'bingo'
        - 'trivia'
        - 'live music'

  - id: 'leavenworth-org'
    name: 'Leavenworth.org'
    url: 'https://leavenworth.org/calendar/'
    type: 'ical'
    ical_url: 'https://leavenworth.org/events/?ical=1'
    geo_filter: null
    default_organization: null
    default_location: null
    default_tag: null
    exclude:
      title_keywords:
        # Bar/restaurant recurring events
        - 'live music:'
        - 'live music at'
        - 'trivia night'
        - 'bingo @'
        # Winery/tasting room events (tourist-focused recurring)
        - '@ icicle ridge winery'
        - '@ goose ridge'
        - '@ milbrandt'
        - '@ evergreen family wines'
        - 'wine tasting'
        - 'winery'
        # Tourist/promotional events
        - 'resort yoga'
        - 'glassblowing'
        - 'glass fusing'
        - '@ boulder bend'
      location_keywords:
        - "visconti's"
        - 'J5 Coffee'
        # Venues we already source directly — avoid duplicates
        - 'icicle creek center'
        - 'ICCA'
        - 'snowy owl'
        - 'wenatchee river institute'
        - 'red barn'
        - 'ski hill'
        - 'ski leavenworth'
        # Out of area (Cascade School District scope: Plain, Leavenworth, Peshastin, Merritt, Stevens Pass)
        - 'NCW Woodshop' # Cashmere
        - 'Boulder Bend' # tourist attraction
        - 'Cashmere'
        - 'Wenatchee'
        - 'East Wenatchee'
        - 'Chelan'
        - 'Ellensburg'

  - id: 'wri'
    name: 'Wenatchee River Institute'
    url: 'https://wenatcheeriverinstitute.org/event-calendar.html'
    type: 'html'
    selectors: {}
    month_url_pattern: 'https://wenatcheeriverinstitute.org/event-calendar.html/calendar/{year}/{month}'
    months_ahead: 3
    detail_description_selectors:
      - '.event-details__description'
    detail_image_selector: 'og:image'
    detail_end_time_selector: '.event-time__end'
    detail_location_selector: '.event-meta__location'
    geo_filter: null
    default_organization: 'Wenatchee River Institute'
    default_location: 'Wenatchee River Institute'
    default_tag: 'nature'
    exclude:
      title_keywords:
        - ' camp'
        - 'science on tap' # held in Wenatchee, not Leavenworth
    series_parent_rules:
      - title_keywords: ['red barn']
        parent_title: 'Red Barn Events'
  
